<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <!-- ramo-pw-gate -->
<script>
(function(){
  var P='ramo2026';
  if(sessionStorage.getItem('ramo_pw')===P)return;
  document.documentElement.style.visibility='hidden';
  function show(){
    var o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;background:#003c38;color:#fff;display:flex;align-items:center;justify-content:center;z-index:2147483647;font-family:Inter,system-ui,sans-serif';
    o.innerHTML='<form style="background:rgba(255,255,255,0.04);border:1px solid rgba(220,242,30,0.18);padding:48px 40px;border-radius:18px;text-align:center;max-width:420px;width:90%;backdrop-filter:blur(8px)"><h1 style="font-family:Playfair Display,Georgia,serif;font-weight:500;font-size:38px;margin:0 0 8px;letter-spacing:-0.01em">Ramo</h1><p style="opacity:0.65;margin:0 0 32px;font-size:14px;letter-spacing:0.02em">Site en mode aperçu</p><input type="password" placeholder="Mot de passe" required style="background:rgba(255,255,255,0.06);border:1px solid rgba(220,242,30,0.22);color:#fff;padding:13px 18px;border-radius:100px;font-size:15px;width:100%;text-align:center;outline:none;box-sizing:border-box;font-family:inherit"><button type="submit" style="background:#DCF21E;color:#003c38;border:none;padding:13px 32px;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;width:100%;font-family:inherit">Accéder</button><div class="err" style="color:#ff8a8a;font-size:13px;margin-top:14px;min-height:18px"></div></form>';
    document.body.appendChild(o);
    document.documentElement.style.visibility='visible';
    var f=o.querySelector('form'),i=o.querySelector('input'),e=o.querySelector('.err');
    i.focus();
    f.addEventListener('submit',function(ev){
      ev.preventDefault();
      if(i.value===P){sessionStorage.setItem('ramo_pw',P);o.remove();}
      else{e.textContent='Mot de passe incorrect';i.value='';i.focus();}
    });
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',show);}
  else{show();}
})();
</script>
